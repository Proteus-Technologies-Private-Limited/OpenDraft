<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenDraft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .logo {
    width: 180px; height: 180px;
    animation: fadeIn 0.6s ease-out;
  }
  .app-name {
    color: #e0e0e0;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 4px;
    word-spacing: 4px;
    margin-top: 20px;
    animation: fadeIn 0.8s ease-out 0.2s both;
  }
  .tagline {
    color: #888;
    font-size: 13px;
    letter-spacing: 1px;
    margin-top: 8px;
    animation: fadeIn 0.8s ease-out 0.4s both;
  }
  .spinner-container {
    margin-top: 40px;
    animation: fadeIn 0.8s ease-out 0.6s both;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #4a9eff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .status {
    color: #666;
    font-size: 12px;
    margin-top: 16px;
    animation: fadeIn 0.8s ease-out 0.8s both;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body data-tauri-drag-region>
  <img class="logo" src="splash-logo.png" alt="OpenDraft">
  <div class="app-name">OPEN DRAFT</div>
  <div class="tagline">Professional Screenwriting</div>
  <div class="spinner-container"><div class="spinner"></div></div>
  <div class="status">Starting up...</div>
</body>
</html>
