<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Open Draft - Screenwriting</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Catch fatal JS errors that prevent React from mounting.
      // Shows a visible error overlay instead of a blank screen.
      window.addEventListener('error', function(e) {
        var d = document.getElementById('_fatal');
        if (!d) {
          d = document.createElement('div');
          d.id = '_fatal';
          d.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;background:#1a1a2e;color:#ff6b6b;font:14px/1.6 monospace;padding:40px;overflow:auto;white-space:pre-wrap;';
          d.innerHTML = '<h2 style="color:#fff;margin-bottom:12px;">OpenDraft failed to start</h2>';
          document.body.appendChild(d);
        }
        d.innerHTML += '\n[ERROR] ' + (e.message || e) + '\n  at ' + (e.filename || '?') + ':' + (e.lineno || '?') + '\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('_fatal');
        if (!d) {
          d = document.createElement('div');
          d.id = '_fatal';
          d.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;background:#1a1a2e;color:#ff6b6b;font:14px/1.6 monospace;padding:40px;overflow:auto;white-space:pre-wrap;';
          d.innerHTML = '<h2 style="color:#fff;margin-bottom:12px;">OpenDraft failed to start</h2>';
          document.body.appendChild(d);
        }
        var msg = e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown rejection';
        d.innerHTML += '\n[UNHANDLED REJECTION] ' + msg + '\n';
      });
      // Timeout: if nothing renders in 8 seconds, show a diagnostic
      window._renderTimeout = setTimeout(function() {
        if (!document.getElementById('root').children.length) {
          var d = document.getElementById('_fatal');
          if (!d) {
            d = document.createElement('div');
            d.id = '_fatal';
            d.style.cssText = 'position:fixed;top:0;right:0;bottom:0;left:0;z-index:99999;background:#1a1a2e;color:#ff9f43;font:14px/1.6 monospace;padding:40px;overflow:auto;white-space:pre-wrap;';
            document.body.appendChild(d);
          }
          d.innerHTML += '<h2 style="color:#fff;margin-bottom:12px;">OpenDraft: Loading timed out</h2>';
          d.innerHTML += 'The app did not render within 8 seconds.\n';
          d.innerHTML += 'Tauri IPC available: ' + !!(window.__TAURI_INTERNALS__) + '\n';
          d.innerHTML += 'User agent: ' + navigator.userAgent + '\n';
          d.innerHTML += 'Location: ' + location.href + '\n';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
