name: Publish Combined Docker Image

# Builds the combined backend+collab image (Dockerfile.combined) and pushes
# multi-arch layers to GitHub Container Registry. Runs on:
#   - every release tag (v*)         → tags :X.Y.Z and :latest
#   - manual workflow_dispatch       → tag from input (default: dev)
#
# The image is published at:
#   ghcr.io/<owner-lowercase>/opendraft-combined
#
# Permissions: GHCR pushes use the workflow's GITHUB_TOKEN (no PAT needed)
# but the repo must opt in:
#   Settings → Actions → General → Workflow permissions →
#     "Read and write permissions" → Save
# After the first successful push, set the package visibility:
#   Profile/Org → Packages → opendraft-combined → Package settings →
#     Change visibility → Public

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (besides commit SHA)'
        required: false
        default: 'dev'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build for both common server architectures. amd64 covers the vast
      # majority of VPS hosts; arm64 covers Apple Silicon dev machines and
      # AWS Graviton / Hetzner ARM instances.
      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes lowercase image name + the right set of tags for either
      # release-tag pushes (vX.Y.Z → X.Y.Z + latest) or manual runs (dev).
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opendraft-combined
          # On v* tags: `latest` and the semver triple. On manual runs: the
          # input value plus the short SHA so dev pushes don't clobber each
          # other in the registry's history.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the registry so subsequent builds (especially the
          # slow Rust-free Node/Python install steps) skip when unchanged.
          cache-from: type=gha
          cache-to: type=gha,mode=max
