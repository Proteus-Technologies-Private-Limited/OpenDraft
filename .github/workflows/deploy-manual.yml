name: Deploy Landing Page & User Manual

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'user-manual/**'
      - 'images/**'
      - '.github/workflows/deploy-manual.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp -r landing/* _site/
          cp -r user-manual _site/user-manual
          cp -r images _site/images

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
