name: Rebuild Legacy Intel DMG

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to rebuild (e.g. v0.16.1)'
        required: true

permissions:
  contents: write

jobs:
  build-intel-mac-legacy:
    runs-on: macos-26
    name: Build (macOS Intel Legacy)

    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend (targeting Safari 13 for Catalina compatibility)
        run: cd frontend && npm run build
        env:
          VITE_API_BASE: http://localhost:18321/api
          BUILD_TARGET: safari13

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured — build will be unsigned"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm $RUNNER_TEMP/certificate.p12

      - name: Patch tauri.conf.json for legacy CI
        run: |
          cd src-tauri
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
          cfg.build.beforeBuildCommand = '';
          cfg.build.beforeDevCommand = '';
          cfg.bundle.macOS = cfg.bundle.macOS || {};
          cfg.bundle.macOS.minimumSystemVersion = '10.13';
          fs.writeFileSync('tauri.conf.json', JSON.stringify(cfg, null, 2));
          "

      - name: Build Tauri app
        id: tauri_build_legacy
        timeout-minutes: 30
        continue-on-error: true
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: npx --prefix frontend tauri build --target x86_64-apple-darwin

      - name: Build Tauri app (retry)
        if: steps.tauri_build_legacy.outcome == 'failure'
        timeout-minutes: 30
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: npx --prefix frontend tauri build --target x86_64-apple-darwin

      - name: Upload legacy DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG found for legacy Intel build"
            exit 1
          fi
          DEST="OpenDraft_${VERSION}_x86_64-legacy.dmg"
          cp "$DMG" "$DEST"
          gh release upload "$TAG" "$DEST" --clobber
          echo "Uploaded $DEST to release $TAG (overwriting existing)"
