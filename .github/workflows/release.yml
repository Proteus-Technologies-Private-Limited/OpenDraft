name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: macos-26
            target: aarch64-apple-darwin
            label: macOS-arm64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python 3.12
        if: runner.os != 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_BASE: http://localhost:18321/api

      - name: Deploy frontend to backend static
        if: runner.os != 'macOS'
        run: |
          rm -rf backend/static
          cp -r frontend/dist backend/static
        shell: bash

      - name: Install Python dependencies
        if: runner.os != 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend sidecar
        if: runner.os != 'macOS'
        run: |
          cd backend
          pyinstaller --noconfirm --clean opendraft-api.spec
        shell: bash

      - name: Install sidecar binary (Unix)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          cp backend/dist/opendraft-api "src-tauri/binaries/opendraft-api-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/opendraft-api-${{ matrix.target }}"

      - name: Install sidecar directory (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/sidecar
          cp -r backend/dist/opendraft-api/* src-tauri/sidecar/

      - name: Download Visual C++ Redistributable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Downloading Visual C++ Redistributable..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "src-tauri/vc_redist.x64.exe"
          $size = (Get-Item "src-tauri/vc_redist.x64.exe").Length / 1MB
          Write-Host "Downloaded vc_redist.x64.exe ($([math]::Round($size, 1)) MB)"

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "No signing certificate configured - build will be unsigned"
            exit 0
          }
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          Write-Host "Certificate imported with thumbprint: $($cert.Thumbprint)"
          "CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Remove-Item $certPath -Force

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured — build will be unsigned"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm $RUNNER_TEMP/certificate.p12
          echo "Apple Developer certificate imported"

      - name: Patch tauri.conf.json for CI
        shell: bash
        run: |
          cd src-tauri
          python3 -c "
          import json, sys, os
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['build']['beforeBuildCommand'] = ''
          cfg['build']['beforeDevCommand'] = ''
          # Windows: switch from externalBin (onefile) to resources (onedir)
          if sys.platform == 'win32':
              cfg['bundle'].pop('externalBin', None)
              cfg['bundle']['resources'] = ['sidecar/*', 'sidecar/**/*', 'vc_redist.x64.exe']
              # Add Windows code signing if certificate is available
              thumbprint = os.environ.get('CERTIFICATE_THUMBPRINT', '')
              if thumbprint:
                  win = cfg['bundle'].setdefault('windows', {})
                  win['certificateThumbprint'] = thumbprint
                  win['timestampUrl'] = 'http://timestamp.digicert.com'
                  win['digestAlgorithm'] = 'sha256'
                  print(f'Windows code signing configured with thumbprint: {thumbprint[:8]}...')
              else:
                  print('No certificate thumbprint found - build will be unsigned')
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Get version number
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing & notarization (ignored on other platforms)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          tauriScript: npx --prefix frontend tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'OpenDraft ${{ github.ref_name }}'
          releaseBody: |
            ## OpenDraft ${{ github.ref_name }}

            A free, open-source screenwriting application. Professional screenplay editing with real-time collaboration — no subscription required.

            ### Download for your platform

            | Platform | File |
            |----------|------|
            | **macOS** (Apple Silicon) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_aarch64.dmg` |
            | **Windows** (64-bit) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_x64-setup.exe` or `.msi` |
            | **Linux** (Debian/Ubuntu) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_amd64.deb` |
            | **Linux** (AppImage) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_amd64.AppImage` |
            | **Android** (APK) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_android.apk` |
            | **iOS** (IPA) | `OpenDraft_${{ steps.get_version.outputs.VERSION }}_ios.ipa` |

            ### Installation

            **macOS:** Open the `.dmg`, drag OpenDraft to Applications, double-click to launch.

            > First launch: Right-click the app, select Open, click Open in the dialog. You only need to do this once.

            **Windows:** Run the `.msi` or `.exe` installer, follow the prompts.
            **Linux:** Install the `.deb` with `sudo dpkg -i OpenDraft_*.deb` or run the `.AppImage` directly.
            **Android:** Download the `.apk` file on your device, enable "Install from unknown sources" if prompted, and install.
            **iOS:** Available on the App Store (search "OpenDraft"), or sideload the `.ipa` via Finder/iTunes.

            > The desktop app is fully standalone — no Python, Node.js, or internet connection required after installation.

            ---

            ### Run in browser (self-hosted)

            ```
            git clone https://github.com/Proteus-Technologies-Private-Limited/OpenDraft.git
            cd OpenDraft
            ./setup.sh
            ```

            See [INSTALLATION.md](https://github.com/Proteus-Technologies-Private-Limited/OpenDraft/blob/main/docs/INSTALLATION.md) for details.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

  build-android:
    runs-on: ubuntu-latest
    name: Build (Android)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Setup root package.json for Gradle build
        run: |
          echo '{"private":true,"scripts":{"tauri":"tauri"}}' > package.json
          ln -s frontend/node_modules node_modules

      - name: Initialize Android project
        run: npx --prefix frontend tauri android init

      - name: Copy Android icons
        run: |
          RES_DIR="src-tauri/gen/android/app/src/main/res"
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$RES_DIR/mipmap-$density"
            cp images/android-icons/mipmap-$density/* "$RES_DIR/mipmap-$density/"
          done

      - name: Add file association intent-filters to AndroidManifest.xml
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          python3 << 'PYEOF'
          import sys

          manifest_path = "src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          with open(manifest_path) as f:
              content = f.read()

          # Intent filters for opening screenplay files
          intent_filters = """
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="file" />
                      <data android:scheme="content" />
                      <data android:mimeType="*/*" />
                      <data android:pathPattern=".*\\\\.fdx" />
                      <data android:pathPattern=".*\\\\.fountain" />
                      <data android:pathPattern=".*\\\\.odraft" />
                  </intent-filter>
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="file" />
                      <data android:scheme="content" />
                      <data android:mimeType="application/xml" />
                      <data android:host="*" />
                  </intent-filter>
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="file" />
                      <data android:scheme="content" />
                      <data android:mimeType="text/plain" />
                      <data android:host="*" />
                  </intent-filter>"""

          # Insert before the closing </activity> tag
          if "</activity>" in content:
              content = content.replace("</activity>", intent_filters + "\n            </activity>", 1)
              with open(manifest_path, "w") as f:
                  f.write(content)
              print("Android manifest patched with file association intent-filters")
          else:
              print("WARNING: Could not find </activity> in manifest — skipping")
          PYEOF

      - name: Patch tauri.conf.json for Android CI
        run: |
          cd src-tauri
          python3 -c "
          import json
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['build']['beforeBuildCommand'] = ''
          cfg['build']['beforeDevCommand'] = ''
          cfg['bundle'].pop('externalBin', None)
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Setup signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/release.keystore
            echo "Using release keystore from secrets"
          else
            echo "No release keystore — generating temporary keystore for signing"
            keytool -genkey -v \
              -keystore $RUNNER_TEMP/release.keystore \
              -alias opendraft \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=OpenDraft, O=OpenDraft" \
              -storepass opendraft -keypass opendraft
          fi
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Use secrets if available, otherwise use temp keystore defaults
          KS_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-opendraft}"
          KS_ALIAS="${ANDROID_KEY_ALIAS:-opendraft}"
          KS_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-opendraft}"

          echo "KEYSTORE_PASSWORD=$KS_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KS_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KS_KEY_PASSWORD" >> $GITHUB_ENV

          python3 << 'PYEOF'
          path = 'src-tauri/gen/android/app/build.gradle.kts'
          with open(path) as f:
              content = f.read()

          signing = '''    signingConfigs {
              create("release") {
                  storeFile = file(System.getenv("KEYSTORE_PATH") ?: "/dev/null")
                  storePassword = System.getenv("KEYSTORE_PASSWORD") ?: ""
                  keyAlias = System.getenv("KEY_ALIAS") ?: ""
                  keyPassword = System.getenv("KEY_PASSWORD") ?: ""
              }
          }
          '''
          content = content.replace('    buildTypes {', signing + '    buildTypes {')
          content = content.replace(
              'getByName("release") {',
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
              1
          )

          with open(path, 'w') as f:
              f.write(content)
          print("Gradle signing config applied")
          PYEOF

      - name: Build Android APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: npx --prefix frontend tauri android build --apk

      - name: Build Android AAB
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: npx --prefix frontend tauri android build --aab

      - name: Prepare artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p android-artifacts

          # Find and rename APK
          APK=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" ! -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" "android-artifacts/OpenDraft_${VERSION}_android.apk"
            echo "APK: $APK -> OpenDraft_${VERSION}_android.apk"
          fi

          # Find and rename AAB
          AAB=$(find src-tauri/gen/android -name "*.aab" -path "*Release*" | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" "android-artifacts/OpenDraft_${VERSION}_android.aab"
            echo "AAB: $AAB -> OpenDraft_${VERSION}_android.aab"
          fi

          ls -la android-artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android-artifacts/*
          draft: true

  build-ios:
    runs-on: macos-26
    name: Build & Submit (iOS)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Import Apple Distribution certificate
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$IOS_CERTIFICATE" ]; then
            echo "::error::IOS_CERTIFICATE secret is required for iOS builds"
            exit 1
          fi
          echo "$IOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import $RUNNER_TEMP/certificate.p12 -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm $RUNNER_TEMP/certificate.p12
          echo "Apple Distribution certificate imported"

      - name: Install provisioning profile
        env:
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          if [ -z "$IOS_PROVISION_PROFILE" ]; then
            echo "::error::IOS_PROVISION_PROFILE secret is required for iOS builds"
            exit 1
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/opendraft.mobileprovision
          echo "Provisioning profile installed"

      - name: Patch tauri.conf.json for iOS CI
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd src-tauri
          python3 -c "
          import json, os
          team_id = os.environ['APPLE_TEAM_ID']
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['build']['beforeBuildCommand'] = ''
          cfg['build']['beforeDevCommand'] = ''
          cfg['bundle'].pop('externalBin', None)
          ios = cfg['bundle'].setdefault('iOS', {})
          ios['developmentTeam'] = team_id
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Setup root package.json for Xcode build
        run: |
          echo '{"private":true,"scripts":{"tauri":"tauri"}}' > package.json
          ln -sf frontend/node_modules node_modules

      - name: Initialize iOS project
        run: npx --prefix frontend tauri ios init

      - name: Add file association declarations to iOS Info.plist
        run: |
          PLIST="src-tauri/gen/apple/opendraft_iOS/Info.plist"
          python3 << 'PYEOF'
          import plistlib, sys

          plist_path = "src-tauri/gen/apple/opendraft_iOS/Info.plist"
          with open(plist_path, "rb") as f:
              plist = plistlib.load(f)

          # Allow opening documents in place and document browser support
          plist["LSSupportsOpeningDocumentsInPlace"] = True
          plist["UISupportsDocumentBrowser"] = True

          # Declare supported document types
          plist["CFBundleDocumentTypes"] = [
              {
                  "CFBundleTypeName": "Final Draft Screenplay",
                  "CFBundleTypeRole": "Editor",
                  "LSHandlerRank": "Default",
                  "LSItemContentTypes": ["com.finaldraft.fdx"],
              },
              {
                  "CFBundleTypeName": "Fountain Screenplay",
                  "CFBundleTypeRole": "Editor",
                  "LSHandlerRank": "Default",
                  "LSItemContentTypes": ["com.proteus.opendraft.fountain"],
              },
              {
                  "CFBundleTypeName": "OpenDraft Screenplay",
                  "CFBundleTypeRole": "Editor",
                  "LSHandlerRank": "Owner",
                  "LSItemContentTypes": ["com.proteus.opendraft.document"],
              },
              {
                  "CFBundleTypeName": "Text File",
                  "CFBundleTypeRole": "Editor",
                  "LSHandlerRank": "Alternate",
                  "LSItemContentTypes": ["public.plain-text"],
              },
          ]

          # Declare custom UTIs so iOS recognises the file extensions
          plist["UTImportedTypeDeclarations"] = [
              {
                  "UTTypeIdentifier": "com.finaldraft.fdx",
                  "UTTypeDescription": "Final Draft Screenplay",
                  "UTTypeConformsTo": ["public.xml"],
                  "UTTypeTagSpecification": {
                      "public.filename-extension": ["fdx"],
                      "public.mime-type": "application/xml",
                  },
              },
              {
                  "UTTypeIdentifier": "com.proteus.opendraft.fountain",
                  "UTTypeDescription": "Fountain Screenplay",
                  "UTTypeConformsTo": ["public.plain-text"],
                  "UTTypeTagSpecification": {
                      "public.filename-extension": ["fountain"],
                      "public.mime-type": "text/plain",
                  },
              },
              {
                  "UTTypeIdentifier": "com.proteus.opendraft.document",
                  "UTTypeDescription": "OpenDraft Screenplay",
                  "UTTypeConformsTo": ["public.json"],
                  "UTTypeTagSpecification": {
                      "public.filename-extension": ["odraft"],
                      "public.mime-type": "application/json",
                  },
              },
          ]

          with open(plist_path, "wb") as f:
              plistlib.dump(plist, f)
          print("iOS Info.plist patched with file association declarations")
          PYEOF

      - name: Configure iOS manual signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Extract provisioning profile UUID
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/opendraft.mobileprovision
          export PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          export PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"

          export PBXPROJ="src-tauri/gen/apple/opendraft.xcodeproj/project.pbxproj"

          # Patch pbxproj with Python for reliable multiline edits
          python3 - "$PBXPROJ" << 'PYEOF'
          import os, sys

          team_id = os.environ['APPLE_TEAM_ID']
          profile_uuid = os.environ['PROFILE_UUID']
          profile_name = os.environ['PROFILE_NAME']
          pbxproj = sys.argv[1]

          with open(pbxproj) as f:
              lines = f.readlines()

          out = []
          for line in lines:
              line = line.replace('CODE_SIGN_IDENTITY = "iPhone Developer"', 'CODE_SIGN_IDENTITY = "Apple Distribution"')
              line = line.replace('CODE_SIGN_IDENTITY = ""', 'CODE_SIGN_IDENTITY = "Apple Distribution"')
              line = line.replace('DEVELOPMENT_TEAM = ""', f'DEVELOPMENT_TEAM = "{team_id}"')
              out.append(line)
              stripped = line.strip()
              if stripped == 'CODE_SIGN_IDENTITY = "Apple Distribution";':
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f'{indent}CODE_SIGN_STYLE = Manual;\n')
                  out.append(f'{indent}PROVISIONING_PROFILE = "{profile_uuid}";\n')
                  out.append(f'{indent}PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";\n')
              if 'DevelopmentTeam' in stripped and '=' in stripped and 'TargetAttributes' not in stripped:
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f'{indent}ProvisioningStyle = Manual;\n')

          with open(pbxproj, 'w') as f:
              f.writelines(out)
          print(f'Configured: team={team_id}, profile={profile_name} ({profile_uuid})')
          PYEOF

          # Write ExportOptions.plist
          python3 - << 'PYEOF'
          import os
          team = os.environ['APPLE_TEAM_ID']
          name = os.environ['PROFILE_NAME']
          plist = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>{team}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.proteus.opendraft</key>
                  <string>{name}</string>
              </dict>
          </dict>
          </plist>"""
          import textwrap
          with open('src-tauri/gen/apple/ExportOptions.plist', 'w') as f:
              f.write(textwrap.dedent(plist).lstrip())
          PYEOF
          echo "iOS signing configured for manual distribution"

      - name: Build iOS app
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --prefix frontend tauri ios build --export-method app-store-connect

      - name: Prepare artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p ios-artifacts
          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" "ios-artifacts/OpenDraft_${VERSION}_ios.ipa"
            echo "IPA: $IPA -> OpenDraft_${VERSION}_ios.ipa"
          fi
          ls -la ios-artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ios-artifacts/*
          draft: true

      - name: Upload to App Store Connect
        continue-on-error: true
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          if [ -z "$APPSTORE_API_KEY" ]; then
            echo "::warning::APPSTORE_API_KEY not configured — skipping upload to App Store Connect"
            exit 0
          fi

          # Save API key for authentication
          mkdir -p ~/.private_keys
          echo "$APPSTORE_API_KEY" | base64 --decode > ~/.private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

          # Find the IPA
          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::warning::No IPA file found — skipping App Store upload"
            exit 0
          fi

          echo "Uploading $IPA to App Store Connect..."
          xcrun altool --upload-app \
            --file "$IPA" \
            --type ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
          echo "Upload complete — check App Store Connect for processing status"

  build-mac-appstore:
    runs-on: macos-26
    name: Build & Submit (macOS App Store)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Import Apple Distribution certificate
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$IOS_CERTIFICATE" ]; then
            echo "::error::IOS_CERTIFICATE (Apple Distribution) secret is required for Mac App Store builds"
            exit 1
          fi
          echo "$IOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/distribution.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import $RUNNER_TEMP/distribution.p12 -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "" build.keychain
          rm $RUNNER_TEMP/distribution.p12
          echo "Apple Distribution certificate imported"

      - name: Import Mac Installer certificate
        env:
          MAC_INSTALLER_CERTIFICATE: ${{ secrets.MAC_INSTALLER_CERTIFICATE }}
          MAC_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$MAC_INSTALLER_CERTIFICATE" ]; then
            echo "::error::MAC_INSTALLER_CERTIFICATE secret is required for Mac App Store builds"
            exit 1
          fi
          echo "$MAC_INSTALLER_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/installer.p12
          security import $RUNNER_TEMP/installer.p12 -k build.keychain \
            -P "$MAC_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "" build.keychain
          rm $RUNNER_TEMP/installer.p12
          echo "Mac Installer certificate imported"

      - name: Install provisioning profile
        env:
          MAC_APPSTORE_PROVISION_PROFILE: ${{ secrets.MAC_APPSTORE_PROVISION_PROFILE }}
        run: |
          if [ -z "$MAC_APPSTORE_PROVISION_PROFILE" ]; then
            echo "::error::MAC_APPSTORE_PROVISION_PROFILE secret is required"
            exit 1
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MAC_APPSTORE_PROVISION_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/opendraft-macos.provisionprofile
          echo "macOS provisioning profile installed"

      - name: Patch tauri.conf.json for Mac App Store CI
        run: |
          cd src-tauri
          python3 -c "
          import json
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['build']['beforeBuildCommand'] = ''
          cfg['build']['beforeDevCommand'] = ''
          cfg['bundle'].pop('externalBin', None)
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Set export compliance (no custom encryption)
        run: |
          PLIST="src-tauri/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
            echo "Export compliance flag set in $PLIST"
          fi
          # Also set in the macOS Info.plist template if it exists
          MAC_PLIST="src-tauri/Info.plist"
          echo "Export compliance configured for macOS App Store"

      - name: Build Tauri app (unsigned)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: APPLE_SIGNING_IDENTITY="-" npx --prefix frontend tauri build --bundles app

      - name: Inject export compliance into built app
        run: |
          APP_PLIST="src-tauri/target/release/bundle/macos/OpenDraft.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$APP_PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$APP_PLIST"
          echo "Export compliance flag set in built app"

      - name: Sign and package for App Store
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/OpenDraft.app"
          ENTITLEMENTS="src-tauri/entitlements/app.entitlements"

          # Find signing identities from keychain
          APP_SIGN_ID=$(security find-identity -v -p codesigning build.keychain | grep "Apple Distribution\|3rd Party Mac Developer Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          INSTALLER_SIGN_ID=$(security find-identity -v build.keychain | grep "Mac Installer Distribution\|3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "App signing identity: $APP_SIGN_ID"
          echo "Installer signing identity: $INSTALLER_SIGN_ID"

          if [ -z "$APP_SIGN_ID" ]; then
            echo "::error::No app signing identity found in keychain"
            exit 1
          fi
          if [ -z "$INSTALLER_SIGN_ID" ]; then
            echo "::error::No installer signing identity found in keychain"
            exit 1
          fi

          # Sign main binary
          codesign --force --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APP_SIGN_ID" \
            "$APP_PATH/Contents/MacOS/opendraft"

          # Sign the entire .app bundle
          codesign --force --deep --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APP_SIGN_ID" \
            "$APP_PATH"

          # Verify signature
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          # Embed provisioning profile
          cp ~/Library/MobileDevice/Provisioning\ Profiles/opendraft-macos.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"

          # Re-sign after embedding profile
          codesign --force --deep --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APP_SIGN_ID" \
            "$APP_PATH"

          # Build .pkg installer
          productbuild --component "$APP_PATH" /Applications \
            --sign "$INSTALLER_SIGN_ID" \
            "OpenDraft.pkg"

          echo "App Store package built: OpenDraft.pkg"

      - name: Upload to App Store Connect
        continue-on-error: true
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          if [ -z "$APPSTORE_API_KEY" ]; then
            echo "::warning::APPSTORE_API_KEY not configured — skipping upload to App Store Connect"
            exit 0
          fi

          mkdir -p ~/.private_keys
          echo "$APPSTORE_API_KEY" | base64 --decode > ~/.private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

          echo "Uploading OpenDraft.pkg to App Store Connect..."
          xcrun altool --upload-app \
            --file "OpenDraft.pkg" \
            --type macos \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
          echo "Upload complete — check App Store Connect for processing status"

  # ── Publish release & update download links ─────────────────────────────
  # Runs only after ALL build jobs succeed. Verifies assets exist on the
  # draft release, publishes it, then updates download links in README.md
  # and landing/index.html so they always point to verified files.
  publish-release:
    needs: [build-desktop, build-android, build-ios, build-mac-appstore]
    runs-on: ubuntu-latest
    name: Publish Release & Update Links

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify release assets exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          EXPECTED_ASSETS=(
            "OpenDraft_${VERSION}_aarch64.dmg"
            "OpenDraft_${VERSION}_x64-setup.exe"
            "OpenDraft_${VERSION}_x64_en-US.msi"
            "OpenDraft_${VERSION}_amd64.deb"
            "OpenDraft_${VERSION}_amd64.AppImage"
            "OpenDraft_${VERSION}_android.apk"
            "OpenDraft_${VERSION}_ios.ipa"
          )

          echo "Checking release assets for ${TAG}..."
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name')

          MISSING=0
          for expected in "${EXPECTED_ASSETS[@]}"; do
            if echo "$ASSETS" | grep -q "^${expected}$"; then
              echo "  [OK] ${expected}"
            else
              echo "  [MISSING] ${expected}"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "::error::${MISSING} expected assets are missing from the release"
            exit 1
          fi

          echo "All expected assets verified."

      - name: Publish release (remove draft status)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
          echo "Release ${{ github.ref_name }} published"

      - name: Update download links in README.md
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_aarch64\.dmg/OpenDraft_${VERSION}_aarch64.dmg/g" README.md
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_x64-setup\.exe/OpenDraft_${VERSION}_x64-setup.exe/g" README.md
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_x64_en-US\.msi/OpenDraft_${VERSION}_x64_en-US.msi/g" README.md
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_amd64\.deb/OpenDraft_${VERSION}_amd64.deb/g" README.md
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_amd64\.AppImage/OpenDraft_${VERSION}_amd64.AppImage/g" README.md
          sed -i "s/OpenDraft-[0-9]*\.[0-9]*\.[0-9]*-1\.x86_64\.rpm/OpenDraft-${VERSION}-1.x86_64.rpm/g" README.md
          echo "README.md download links updated to ${VERSION}"

      - name: Update download links in landing/index.html
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_aarch64\.dmg/OpenDraft_${VERSION}_aarch64.dmg/g" landing/index.html
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_x64-setup\.exe/OpenDraft_${VERSION}_x64-setup.exe/g" landing/index.html
          sed -i "s/OpenDraft_[0-9]*\.[0-9]*\.[0-9]*_amd64\.deb/OpenDraft_${VERSION}_amd64.deb/g" landing/index.html
          echo "landing/index.html download links updated to ${VERSION}"

      - name: Create PR with updated links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BRANCH="auto/update-links-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md landing/index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git checkout -b "$BRANCH"
          git commit -m "Update download links to v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update download links to v${VERSION}" \
            --body "Automated update after v${VERSION} release assets verified. Merge to update landing page." \
            --base main \
            --head "$BRANCH" \
            --repo "${{ github.repository }}"
